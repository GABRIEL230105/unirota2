services:
  postgres:
    image: postgres:16
    container_name: unirota_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: unirota_db
    ports:
      - "5432:5432"
    volumes:
      - unirota_postgres_data:/var/lib/postgresql/data

volumes:
  unirota_postgres_data:
